<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor de la ventana estilo retro -->
    <section class="window">
        <header class="titlebar">
            <span>LOVE</span>
            <div class="window-controls">
                <span>─</span>
                <span>❑</span>
                <span>X</span>
            </div>
        </header>
        
        <div class="window-content">
            <h1 id="title">Happy 13 months, my love ♡ Still love me?</h1>
            
            <!-- Aquí puedes meter una imagen de pixel art o un gif de gatito -->
            <div class="image-container">
                <img src="gato.jpg" alt="Gatito pixel" id="gato">
            </div>

            <div class="buttons">
                <button id="yesBtn">YES</button>
                <button id="noBtn">NO</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
